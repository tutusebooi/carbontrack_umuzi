<!DOCTYPE html>
<html>
<head>
  <title>EcoTrack</title>
</head>
<body>

<h1>Umuzi_EcoTrack_Platform</h1>

<div id="auth">
  <h2>Register</h2>
  <input id="regEmail" placeholder="Email">
  <input id="regPass" placeholder="Password">
  <button onclick="register()">Register</button>

  <h2>Login</h2>
  <input id="logEmail" placeholder="Email">
  <input id="logPass" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">
  <h2>Add Activity</h2>
  <input id="activity" placeholder="Activity">
  <input id="co2" type="number" placeholder="CO2">
  <button onclick="addActivity()">Add</button>

  <h3>Total: <span id="total">0</span></h3>
  <ul id="list"></ul>
</div>

<script src="app.js"></script>
</body>
</html>
